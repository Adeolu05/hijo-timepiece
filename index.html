<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Official Hijo Lux Watches website: luxury wristwatches, vintage & authentic timepieces. Hijo watches & Hijo Lux — Lagos, Nigeria. Shop online, WhatsApp enquiries, UAE & worldwide shipping."
    />
    <meta name="theme-color" content="#1C1C17" />
    <link rel="canonical" href="https://www.hijoluxwatches.com/" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Hijo Lux Watches | Official website | Authentic luxury timepieces"
    />
    <meta
      property="og:description"
      content="Official Hijo Lux Watches store: authentic luxury, vintage, and modern watches. Registered as Hijo Multiservice Timepieces, Lagos — worldwide shipping. Instagram @hijoluxwatches."
    />
    <meta property="og:site_name" content="Hijo Lux Watches" />
    <meta property="og:url" content="https://www.hijoluxwatches.com/" />
    <meta property="og:image" content="https://www.hijoluxwatches.com/hijo-lux-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Hijo Lux Watches | Official website | Authentic luxury timepieces"
    />
    <meta
      name="twitter:description"
      content="Official website: Hijo Lux Watches — luxury, vintage & modern timepieces. Lagos, Nigeria. Worldwide shipping."
    />
    <meta name="twitter:image" content="https://www.hijoluxwatches.com/hijo-lux-logo.png" />
    <link rel="icon" href="/hijo-lux-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/hijo-lux-logo.png" />
    <title>Hijo Lux Watches | Official website | Authentic luxury timepieces</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.hijoluxwatches.com/#organization",
            "name": "Hijo Multiservice Timepieces",
            "alternateName": ["Hijo Lux Watches", "Hijo Lux", "HIJO Lux Watches"],
            "url": "https://www.hijoluxwatches.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://www.hijoluxwatches.com/hijo-lux-logo.png",
              "contentUrl": "https://www.hijoluxwatches.com/hijo-lux-logo.png"
            },
            "sameAs": [
              "https://www.instagram.com/hijoluxwatches/",
              "https://www.tiktok.com/@hijoluxwatches"
            ],
            "knowsAbout": [
              "Luxury wristwatches",
              "Vintage watches",
              "Pre-owned watches",
              "Watch dealers Nigeria",
              "Hijo Lux watches",
              "Authentic timepieces"
            ],
            "description": "Trusted dealer in luxury wristwatches, vintage watches, and modern timepieces. Based in Lagos, Nigeria; UAE & worldwide shipping.",
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "customer service",
              "email": "hijoluxwatches@gmail.com",
              "areaServed": ["NG", "AE", "Worldwide"],
              "availableLanguage": ["en"]
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://www.hijoluxwatches.com/#website",
            "url": "https://www.hijoluxwatches.com/",
            "name": "Hijo Lux Watches",
            "alternateName": "Hijo Multiservice Timepieces",
            "description": "Official website of Hijo Lux Watches: shop luxury wristwatches, vintage & modern watches, enquire on WhatsApp, worldwide shipping.",
            "publisher": { "@id": "https://www.hijoluxwatches.com/#organization" },
            "inLanguage": "en-NG",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://www.hijoluxwatches.com/shop?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
